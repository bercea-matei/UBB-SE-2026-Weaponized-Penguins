name: Verify Build & Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Clear NuGet cache
      run: dotnet nuget locals all --clear

    - name: Restore Dependencies
      run: dotnet restore Boards_WP.slnx

    - name: Clean build artifacts
      run: dotnet clean

    - name: Build Solution
      run: dotnet build Boards_WP.slnx -c Debug --no-restore /p:Platform=x64 /p:PublishReadyToRun=false

    - name: Run Unit Tests
      run: dotnet test Boards_WP.slnx -c Debug --no-build --verbosity normal /p:Platform=x64